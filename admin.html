<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<script>
if(sessionStorage.getItem("isAdminLoggedIn") !== "true"){
  location.href = "login.html";
}
</script>

<div class="admin-container">

  <h1>ระบบจัดการข้อมูลศิษย์เก่า</h1>

  <form id="studentForm">

    <input type="hidden" id="docId">

    <input type="text" id="idCard" placeholder="เลขบัตรประชาชน" required>

    <input type="text" id="studentId" placeholder="รหัสนักเรียน" required>

    <select id="prefix">
      <option value="เด็กชาย">เด็กชาย</option>
      <option value="เด็กหญิง">เด็กหญิง</option>
    </select>

    <input type="text" id="firstname" placeholder="ชื่อ" required>

    <input type="text" id="lastname" placeholder="นามสกุล" required>

    <input type="text" id="classroom" placeholder="ห้อง">

    <input type="number" id="graduateYear" placeholder="ปีที่จบ">

    <input type="file" id="diplomaFile">

    <button type="submit">
      บันทึกข้อมูล
    </button>

  </form>

  <table>

    <thead>
      <tr>
        <th>รหัส</th>
        <th>ชื่อ</th>
        <th>ห้อง</th>
        <th>ปีจบ</th>
        <th>จัดการ</th>
      </tr>
    </thead>

    <tbody id="studentTableBody"></tbody>

  </table>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
