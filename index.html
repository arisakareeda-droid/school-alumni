<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบฐานข้อมูลศิษย์เก่าโรงเรียน</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container">
      <h1>🎓 ระบบค้นหาข้อมูลศิษย์เก่า</h1>
      <p>โรงเรียนของเรา</p>
    </div>
  </header>

  <main class="container">
    <section class="search-box">
      <input type="text" id="searchInput" placeholder="พิมพ์ชื่อ, นามสกุล หรือปีที่จบ เพื่อค้นหา...">
      <button id="searchBtn">ค้นหา</button>
    </section>

    <section class="result-section">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>รหัสนักเรียน</th>
              <th>ชื่อ-นามสกุล</th>
              <th>ปีที่จบ</th>
              <th>ห้อง</th>
              <th>ใบจบการศึกษา</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <tr>
              <td colspan="5" class="text-center" style="text-align: center;">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
