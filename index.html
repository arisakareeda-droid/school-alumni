<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โรงเรียนบ้านน้ำเค็ม - ระบบข้อมูลศิษย์เก่า</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  font-family:'Sarabun',sans-serif;
  overflow:hidden;
}

/* ===== BACKGROUND - สีขาวล้วนทั้งหน้า ===== */
body{
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background-color: #ffffff;
}

/* ===== CONTAINER (ไม่มีกรอบ) ===== */
.welcome-container{
  width:90%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  /* นำ background, border, และ shadow ออกเพื่อให้กลมกลืนกับพื้นหลัง */
}

/* ===== LOGO ===== */
.logo{
  width:160px;
  height:160px;
  object-fit:contain;
  background:white;
  padding:15px;
  border-radius:50%;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s ease;
}

.logo:hover{ transform:scale(1.05) rotate(-2deg); }

/* ===== TEXT ===== */
h2{ margin:25px 0 10px; font-size:32px; color:#0f172a; }
p{ font-size:18px; color:#475569; line-height:1.7; margin-bottom:40px; }

/* ===== BUTTON ===== */
.btn-role{
  display:block;
  width:100%;
  max-width:400px;
  padding:18px;
  margin:12px 0;
  border-radius:18px;
  text-decoration:none;
  font-weight:700;
  font-size:18px;
  position:relative;
  overflow:hidden;
  transition:0.3s ease;
}

.btn-role:hover{ transform:translateY(-4px); box-shadow:0 10px 20px rgba(0,0,0,0.15); }
.btn-role:active{ transform:scale(0.97); }

/* Shimmer Effect */
.btn-role::before{
  content:"";
  position:absolute; top:0; left:-100%; width:100%; height:100%;
  background:rgba(255,255,255,0.25);
  transform:skewX(-20deg); transition:0.6s;
}
.btn-role:hover::before{ left:120%; }

.btn-alumni{ background:linear-gradient(135deg,#16a34a,#22c55e); color:white; }
.btn-admin{ background:linear-gradient(135deg,#0ea5e9,#2563eb); color:white; }

</style>
</head>
<body>

<div class="welcome-container">
  <img src="logo.png" class="logo" onerror="this.src='https://placehold.co/300x300/ffffff/16a34a?text=LOGO'">
  <h2>โรงเรียนบ้านน้ำเค็ม</h2>
  <p>ระบบข้อมูลศิษย์เก่าออนไลน์<br>กรุณาเลือกประเภทการเข้าใช้งาน</p>
  <a href="std-search.html" class="btn-role btn-alumni">สำหรับศิษย์เก่า</a>
  <a href="login.html" class="btn-role btn-admin">สำหรับบุคลากร / ผู้ดูแลระบบ</a>
</div>

</body>
</html>
